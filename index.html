<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirtMc | Responsive Cyber Archive</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --bg-color: #030508;
            --accent: #00ff66;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            background-image: radial-gradient(circle at center, #0a1f0e 0%, #030508 100%);
        }

        .auth-container {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px 30px;
            border-radius: 28px;
            border: 1px solid var(--border);
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            transition: all 0.4s ease;
            box-sizing: border-box;
        }

        /* ضبط العرض حسب نوع الشاشة */
        @media (min-width: 768px) {
            .auth-container {
                max-width: 450px; /* للـ PC */
                padding: 50px 40px;
            }
        }

        @media (max-width: 767px) {
            .auth-container {
                max-width: 100%; /* للجوال */
                border-radius: 20px;
            }
            h2 { font-size: 24px !important; }
        }

        .auth-container::before {
            content: "";
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 50%; height: 3px;
            background: var(--accent);
            box-shadow: 0 0 25px var(--accent);
            border-radius: 0 0 10px 10px;
        }

        h2 { 
            font-size: 30px; 
            letter-spacing: 5px; 
            margin-bottom: 35px;
            background: linear-gradient(to bottom, #ffffff 0%, #2ea043 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            transform: scale(1.01);
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            border: none;
            color: #000;
            font-weight: 800;
            border-radius: 15px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.4);
        }

        .status-done {
            display: none;
            color: var(--accent);
            background: rgba(0, 255, 102, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--accent);
            font-size: 14px;
            font-weight: bold;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        #dirtScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #dirtText {
            font-size: clamp(60px, 20vw, 150px);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 50px var(--accent);
        }

        .switch-link { margin-top: 25px; display: block; color: #777; cursor: pointer; text-decoration: none; font-size: 14px; }
        .switch-link:hover { color: var(--accent); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="registerBox" class="auth-container">
        <div id="regStatus" class="status-done">✅ SEND DONE! CHECK YOUR EMAIL</div>
        <h2>REGISTER</h2>
        <input type="text" id="regUser" placeholder="USERNAME">
        <input type="email" id="regEmail" placeholder="EMAIL ADDRESS">
        <input type="password" id="regPass" placeholder="PASSWORD">
        <button class="btn" id="regBtn" onclick="handleAuth('register')">Get Code</button>
        
        <div id="regVerify" class="hidden">
            <input type="text" id="regCodeInput" placeholder="ENTER 4-DIGIT CODE" style="margin-top:20px; border-color:var(--accent);">
            <button class="btn" onclick="completeRegister()">SAVE TO ARCHIVE</button>
        </div>
        <span class="switch-link" onclick="showBox('loginBox')">ALREADY REGISTERED? LOGIN</span>
    </div>

    <div id="loginBox" class="auth-container hidden">
        <div id="loginStatus" class="status-done">✅ SEND DONE! CHECK YOUR EMAIL</div>
        <h2>LOGIN</h2>
        <input type="text" id="loginUser" placeholder="USERNAME">
        <input type="password" id="loginPass" placeholder="PASSWORD">
        <button class="btn" id="loginBtn" onclick="handleAuth('login')">Request 2FA</button>
        
        <div id="login2FA" class="hidden">
            <input type="text" id="loginCodeInput" placeholder="ENTER 2FA CODE" style="margin-top:20px; border-color:var(--accent);">
            <button class="btn" onclick="completeLogin()">AUTHORIZE</button>
        </div>
        <span class="switch-link" onclick="showBox('registerBox')">NEW PLAYER? CREATE ACCOUNT</span>
    </div>

    <div id="dirtScreen">
        <h1 id="dirtText">DIRT</h1>
        <a href="https://Discord.gg/dirtmc" target="_blank" style="color: var(--accent); text-decoration: none; font-weight: bold; letter-spacing: 5px;">DISCORD.GG/DIRTMC</a>
        <button class="btn" style="width: auto; padding: 12px 60px; margin-top: 50px; background: #111;" onclick="location.reload()">LOGOUT</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7oGrcD1ShriCYTP_0_vMPdPkkmd2GfwU",
            authDomain: "dirtmc-7c068.firebaseapp.com",
            projectId: "dirtmc-7c068",
            storageBucket: "dirtmc-7c068.firebasestorage.app",
            messagingSenderId: "808909665625",
            appId: "1:808909665625:web:0aa7aaad9c31dc0e0d4848",
            measurementId: "G-449ZMPHQL6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fBase = { db, doc, setDoc, getDoc };
    </script>

    <script>
        (function() { emailjs.init("OqV7lpJJmCVgAnrx6"); })();
        let generatedCode = null;

        function showBox(id) {
            document.querySelectorAll('.auth-container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function handleAuth(type) {
            const user = (type === 'register') ? document.getElementById('regUser').value : document.getElementById('loginUser').value;
            const pass = (type === 'register') ? document.getElementById('regPass').value : document.getElementById('loginPass').value;
            const btn = (type === 'register') ? document.getElementById('regBtn') : document.getElementById('loginBtn');
            const status = (type === 'register') ? document.getElementById('regStatus') : document.getElementById('loginStatus');
            let email = "";

            if (!user || !pass) return alert("يرجى إدخال البيانات كاملة");

            btn.disabled = true;
            btn.innerText = "Processing...";

            if (type === 'register') {
                email = document.getElementById('regEmail').value;
                if (!email) { btn.disabled = false; btn.innerText = "Get Code"; return alert("أدخل الإيميل!"); }
            } else {
                try {
                    const userRef = window.fBase.doc(window.fBase.db, "users", user);
                    const snap = await window.fBase.getDoc(userRef);
                    if (snap.exists() && snap.data().password === pass) {
                        email = snap.data().email;
                    } else {
                        alert("بيانات خاطئة!");
                        btn.disabled = false; btn.innerText = "Request 2FA";
                        return;
                    }
                } catch(e) { alert("خطأ في الاتصال بالقاعدة"); btn.disabled = false; return; }
            }

            generatedCode = Math.floor(1000 + Math.random() * 9000);

            emailjs.send("service_nd6soio", "Template_f837clr", {
                to_email: email,
                verification_code: generatedCode
            }).then(() => {
                status.style.display = 'block';
                setTimeout(() => { status.style.display = 'none'; }, 6000);
                btn.innerText = "Sent ✅";
                if (type === 'register') document.getElementById('regVerify').classList.remove('hidden');
                else document.getElementById('login2FA').classList.remove('hidden');
            }).catch(() => {
                alert("خطأ في إرسال الكود!");
                btn.disabled = false;
            });
        }

        async function completeRegister() {
            const user = document.getElementById('regUser').value;
            const pass = document.getElementById('regPass').value;
            const email = document.getElementById('regEmail').value;
            if (document.getElementById('regCodeInput').value == generatedCode) {
                await window.fBase.setDoc(window.fBase.doc(window.fBase.db, "users", user), {
                    username: user, password: pass, email: email
                });
                alert("تم الحفظ في الأرشيف!");
                showBox('loginBox');
            } else alert("كود خطأ!");
        }

        function completeLogin() {
            if (document.getElementById('loginCodeInput').value == generatedCode) {
                document.getElementById('dirtScreen').style.display = 'flex';
            } else alert("كود خطأ!");
        }
    </script>
</body>
</html>
