<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>DirtMc Server</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
 --bg:#0d0d0d;
 --text:#ffffff;
 --accent:#3a5aff;
}

body{
 margin:0;
 font-family:'Segoe UI',sans-serif;
 background:var(--bg);
 color:var(--text);
 overflow-x:auto;

 background-image:
 linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
 url('back.png');
 background-size:cover;
 background-position:center;
 background-attachment:fixed;
}

/* Wrapper ثابت مثل PC */
.wrapper{
 width:1200px;
 margin:auto;
}

/* NAV */
nav{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:25px 0;
 border-bottom:3px solid var(--accent);
}

.logo{
 font-size:34px;
 font-weight:bold;
 color:var(--accent);
 font-family:'Courier New',monospace;
 letter-spacing:2px;
}

.links a{
 margin:0 15px;
 color:white;
 text-decoration:none;
 font-weight:bold;
 transition:0.3s;
}

.links a:hover{
 color:var(--accent);
}

/* HERO */
.hero{
 display:flex;
 justify-content:space-between;
 align-items:center;
 height:85vh;
}

.hero-text{
 max-width:600px;
}

.tag{
 background:var(--accent);
 padding:6px 14px;
 font-weight:bold;
 border-radius:6px;
 display:inline-block;
}

.hero-text h1{
 font-size:72px;
 margin:20px 0;
 font-family:'Courier New',monospace;
}

.hero-text p{
 font-size:22px;
 opacity:0.8;
}

/* BUTTONS */
.btn{
 margin-top:20px;
 padding:15px 30px;
 background:var(--accent);
 border:none;
 font-weight:bold;
 cursor:pointer;
 color:white;
 border-radius:8px;
 box-shadow:0 0 25px var(--accent);
 transition:0.3s;
 font-size:16px;
}

.btn:hover{
 transform:translateY(-4px);
 box-shadow:0 0 40px var(--accent);
}

/* UPTIME BOX */
.status{
 margin-top:20px;
 background:rgba(0,0,0,0.6);
 padding:10px 15px;
 border-radius:6px;
 display:inline-block;
 font-weight:bold;
}

/* CHARACTER */
.hero img{
 width:420px;
 filter:drop-shadow(0 0 30px var(--accent));
 animation:float 3s ease-in-out infinite;
}

@keyframes float{
 0%,100%{transform:translateY(0);}
 50%{transform:translateY(-15px);}
}

/* زوم للجوال */
@media (max-width:768px){
 body{
  zoom:0.55;
 }
}

</style>
</head>

<body>

<div class="wrapper">

<nav>
 <div class="logo">DirtMc</div>
 <div class="links">
  <a href="#">Home</a>
  <a href="#">Perks</a>
  <a href="#">Servers</a>
  <a href="https://discord.gg/dirtmc">Discord</a>
 </div>
</nav>

<section class="hero">

 <div class="hero-text">
  <div class="tag">HERE AND NOW</div>
  <h1>DirtMc Server</h1>
  <p>أفضل سيرفر QuickBox | play.dirtmc.net</p>

  <button class="btn" onclick="copyIP()">COPY IP</button>

  <div class="status">
   UPTIME: <span id="uptime">99%</span>
  </div>

 </div>

 <img src="netherite.png" alt="Character">

</section>

</div>

<script>

function copyIP(){
 const ip = "play.dirtmc.net";
 navigator.clipboard.writeText(ip);
 alert("تم نسخ IP السيرفر!");
}

/* عداد UPTIME شكلي */
setInterval(()=>{
 let random = (98 + Math.random()*2).toFixed(2);
 document.getElementById("uptime").innerText = random + "%";
},5000);

</script>

</body>
</html>
