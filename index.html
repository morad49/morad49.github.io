<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DirtMc Server</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Cairo',sans-serif;
  min-height:100vh;
  background: url('back.png') no-repeat center center;
  background-size: cover;
  background-color:#000;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding:5%;
  direction:rtl;
  color:#fff;
}

/* طبقة تعتيم */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:0;
}

/* المحتوى */
.content{
  position:relative;
  z-index:1;
  max-width:500px;
  text-align:right;
}

/* العنوان */
.content h1{
  font-size:55px;
  margin-bottom:15px;
  color:#00ffff;
  text-shadow:0 0 15px #00ffff;
}

/* النص */
.content p{
  font-size:20px;
  margin-bottom:25px;
  line-height:1.7;
  color:#ddd;
}

/* زر */
.btn{
  display:inline-block;
  padding:14px 35px;
  background:#00ffff;
  color:#000;
  text-decoration:none;
  font-weight:bold;
  border-radius:8px;
  transition:0.3s;
}

.btn:hover{
  background:#00cccc;
  transform:scale(1.05);
}

/* للجوال */
@media (max-width:768px){

  body{
    justify-content:center;
    text-align:center;
  }

  .content{
    max-width:100%;
  }

  .content h1{
    font-size:40px;
  }

  .content p{
    font-size:18px;
  }
}
</style>
</head>

<body>

<div class="content">
  <h1>DirtMc Server</h1>
  <p>أفضل سيرفر ماينكرافت بستايل مظلم واحترافي.  
  انضم الآن واستمتع بتجربة لعب خرافية.</p>

  <a href="#" class="btn">انضم الآن</a>
</div>

</body>
</html>
