<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DirtMc Account</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#000;
 --text:#fff;
 --card:rgba(255,255,255,0.05);
}

.light{
 --bg:#f2f2f2;
 --text:#000;
 --card:rgba(0,0,0,0.05);
}

body{
 margin:0;
 font-family:Poppins;
 background:var(--bg);
 color:var(--text);
 display:flex;
 align-items:center;
 justify-content:center;
 height:100vh;
 transition:.5s;
 overflow:hidden;
}

/* Toggle */
.toggle{
 position:absolute;
 top:20px;
 right:20px;
 font-size:26px;
 cursor:pointer;
}

/* Card */
.card{
 background:var(--card);
 backdrop-filter:blur(15px);
 padding:40px;
 border-radius:20px;
 width:350px;
 text-align:center;
 box-shadow:0 0 50px rgba(120,100,255,.2);
}

input{
 width:100%;
 padding:12px;
 margin:10px 0;
 border:none;
 border-radius:10px;
 outline:none;
}

button{
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
 font-weight:bold;
 cursor:pointer;
 background:linear-gradient(90deg,#7a6bff,#a29bff);
 color:#fff;
 transition:.3s;
}

button:hover{
 transform:scale(1.05);
}

/* Main Screen */
.mainScreen{
 display:none;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 height:100vh;
 text-align:center;
}

.mainScreen h1{
 font-size:60px;
 text-shadow:0 0 40px #7a6bff;
}

.discord{
 margin-top:20px;
 padding:12px 25px;
 border-radius:40px;
 background:#5865F2;
 color:white;
 text-decoration:none;
 font-weight:bold;
}

/* Hide */
.hidden{display:none;}

</style>
</head>
<body>

<div class="toggle" onclick="toggleTheme()">☀️</div>

<!-- AUTH -->
<div class="card" id="authBox">
<h2>Register / Login</h2>

<input type="text" id="email" placeholder="Enter Email">
<input type="password" id="pass" placeholder="Enter Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="msg"></p>
</div>

<!-- MAIN -->
<div class="mainScreen" id="mainScreen">
<h1>DirtMc</h1>
<a class="discord" href="https://discord.gg/dirtmc" target="_blank">Join Discord</a>
</div>

<script>

/* ===== REGISTER ===== */
function register(){
 let email = document.getElementById("email").value;
 let pass = document.getElementById("pass").value;

 if(!email || !pass){
  showMsg("Fill fields");
  return;
 }

 localStorage.setItem("archive_email", email);
 localStorage.setItem("archive_pass", pass);

 showMsg("Registered Successfully");
}

/* ===== LOGIN ===== */
function login(){
 let email = document.getElementById("email").value;
 let pass = document.getElementById("pass").value;

 let savedEmail = localStorage.getItem("archive_email");
 let savedPass = localStorage.getItem("archive_pass");

 if(email === savedEmail && pass === savedPass){
   document.getElementById("authBox").classList.add("hidden");
   document.getElementById("mainScreen").style.display="flex";
 }else{
   showMsg("Wrong account");
 }
}

/* ===== Theme Toggle ===== */
function toggleTheme(){
 document.body.classList.toggle("light");
 let icon = document.querySelector(".toggle");

 if(document.body.classList.contains("light")){
   icon.innerText="🌙";
 }else{
   icon.innerText="☀️";
 }
}

/* Helper */
function showMsg(m){
 document.getElementById("msg").innerText = m;
}

</script>

</body>
</html>
