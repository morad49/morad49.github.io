<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirtMc | Premium Archive</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <div id="registerBox" class="auth-container fade-in">
        <h2>REGISTER</h2>
        <input type="text" id="regUser" placeholder="USERNAME">
        <input type="email" id="regEmail" placeholder="EMAIL ADDRESS">
        <input type="password" id="regPass" placeholder="PASSWORD">
        
        <button class="btn effect-btn" id="regBtn" onclick="handleAuth('register')">GET ACCESS CODE</button>
        
        <div id="regVerify" class="hidden slide-down">
            <p class="check-email-txt">📩 CHECK YOUR EMAIL</p>
            <input type="text" id="regCodeInput" placeholder="4-DIGIT CODE" class="code-input">
            <button class="btn effect-btn done-btn" onclick="completeRegister()">AUTHORIZE</button>
        </div>
        
        <span class="switch-link" onclick="showBox('loginBox')">ALREADY ARCHIVED? SIGN IN</span>
    </div>

    <div id="loginBox" class="auth-container hidden">
        <h2>LOGIN</h2>
        <input type="text" id="loginUser" placeholder="USERNAME">
        <input type="password" id="loginPass" placeholder="PASSWORD">
        
        <button class="btn effect-btn" id="loginBtn" onclick="handleAuth('login')">REQUEST 2FA</button>
        
        <div id="login2FA" class="hidden slide-down">
            <p class="check-email-txt">📩 CHECK YOUR EMAIL</p>
            <input type="text" id="loginCodeInput" placeholder="2FA CODE" class="code-input">
            <button class="btn effect-btn done-btn" onclick="completeLogin()">AUTHORIZE</button>
        </div>
        
        <span class="switch-link" onclick="showBox('registerBox')">NEW PLAYER? CREATE ARCHIVE</span>
    </div>

    <div id="dirtScreen" class="hidden fade-in">
        <h1 id="dirtText">DIRT</h1>
        <div class="server-info">
            <div class="ip-box">IP: <span>dirtmc.pro:21411</span></div>
            <a href="https://discord.gg/dirtmc" target="_blank" class="btn effect-btn discord-btn">JOIN DISCORD</a>
        </div>
        <button class="btn logout-btn" onclick="location.reload()">TERMINATE SESSION</button>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
