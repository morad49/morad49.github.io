<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DirtMc</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">DIRT</div>

  <div class="menu-area">
    <a id="discordLink" class="discord-btn">Discord</a>

    <div id="hamburger" class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div id="themeMenu" class="theme-menu">
      <div class="opt" data-theme="night">🌙</div>
      <div class="opt" data-theme="sun">☀️</div>
      <div class="opt" data-theme="both">⚪⚫</div>
    </div>
  </div>
</header>

<main>
  <div class="card">
    <h1>Dirt</h1>
    <p id="welcomeText">مرحبا — زائر</p>
    <button id="openRegister">Register / Login</button>
    <button id="logoutBtn">Logout</button>
    <button id="openBackup">Backup / Import</button>
  </div>
</main>

<div id="authModal" class="overlay">
  <div class="modal">

    <div id="registerBox">
      <h3>Register</h3>
      <input id="regEmail" type="email" placeholder="Email">
      <input id="regPass" type="password" placeholder="Password">
      <input id="regUser" type="text" placeholder="Username">
      <label><input type="checkbox" id="remember"> Remember me</label>
      <button id="doRegister">Register</button>
      <button id="gotoLogin">I have account</button>
    </div>

    <div id="loginBox" style="display:none">
      <h3>Login</h3>
      <input id="loginEmail" type="email" placeholder="Email">
      <input id="loginPass" type="password" placeholder="Password">
      <label><input type="checkbox" id="rememberLogin"> Remember me</label>
      <button id="doLogin">Login</button>
      <button id="gotoRegister">Create account</button>
    </div>

  </div>
</div>

<div id="backupModal" class="overlay">
  <div class="modal">
    <h3>Backup / Import</h3>
    <textarea id="backupOut" readonly></textarea>
    <textarea id="backupIn" placeholder="Paste backup here"></textarea>
    <button id="doExport">Export</button>
    <button id="doImport">Import</button>
    <button id="closeBackup">Close</button>
  </div>
</div>

<div id="splitWrap" class="split-wrap"></div>

<script src="script.js"></script>
</body>
</html>
