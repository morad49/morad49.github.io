<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirtMc | نظام الحماية والأرشفة العالمية</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --bg: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
            --accent: #1c3dff;
            --border: rgba(255, 255, 255, 0.1);
        }

        body.light-mode {
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #121417;
            --accent: #2b3b8c;
            --border: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: 0.5s;
            overflow: hidden;
        }

        .theme-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            font-size: 28px;
            cursor: pointer;
            z-index: 1000;
        }

        .auth-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(15px);
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            z-index: 10;
        }

        h2 { margin-bottom: 20px; font-weight: 600; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            box-sizing: border-box;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn:disabled { background: #444; cursor: not-allowed; }

        #dirtScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #dirtText {
            font-size: clamp(80px, 15vw, 150px);
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 30px var(--accent);
            margin: 0;
            color: #fff;
        }

        .hidden { display: none; }
        .switch-link { margin-top: 15px; display: block; color: var(--accent); cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <div class="theme-toggle" onclick="toggleTheme()">
        <i id="themeIcon" class="fas fa-moon"></i>
    </div>

    <div id="registerBox" class="auth-container">
        <h2>إنشاء حساب</h2>
        <input type="text" id="regUser" placeholder="اسم المستخدم">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
        <button class="btn" id="regSendBtn" onclick="handleSendEmail('register')">إرسال كود التحقق</button>
        
        <div id="regVerify" class="hidden">
            <input type="text" id="regCodeInput" placeholder="أدخل الكود">
            <button class="btn" onclick="finishRegister()">تأكيد وحفظ في الأرشيف</button>
        </div>
        <span class="switch-link" onclick="showBox('loginBox')">لديك حساب؟ دخول</span>
    </div>

    <div id="loginBox" class="auth-container hidden">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="loginUser" placeholder="اسم المستخدم">
        <button class="btn" id="loginSendBtn" onclick="handleSendEmail('login')">إرسال كود 2FA</button>
        
        <div id="login2FA" class="hidden">
            <input type="text" id="loginCodeInput" placeholder="أدخل كود 2FA">
            <button class="btn" onclick="finishLogin()">دخول</button>
        </div>
        <span class="switch-link" onclick="showBox('registerBox')">حساب جديد</span>
    </div>

    <div id="dirtScreen">
        <h1 id="dirtText">DIRT</h1>
        <a href="https://Discord.gg/dirtmc" target="_blank" style="color: #5865F2; text-decoration: none; font-size: 24px; margin-top: 20px;">Discord.gg/dirtmc</a>
        <button class="btn" style="width: auto; padding: 10px 30px; margin-top: 40px; background: #222;" onclick="logout()">خروج</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        // 1. إعدادات FIREBASE (استبدلها ببياناتك)
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // جعلها متاحة للدوال العادية
        window.db = db;
        window.doc = doc;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
    </script>

    <script>
        // 2. إعدادات EMAILJS (استبدلها ببياناتك)
        (function() {
            emailjs.init("YOUR_PUBLIC_KEY"); // Public Key من EmailJS
        })();

        let generatedCode = null;

        // التحقق من حالة الدخول السابقة
        if (localStorage.getItem('isLoggedIn') === 'true') {
            document.getElementById('dirtScreen').style.display = 'flex';
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('themeIcon');
            icon.className = document.body.classList.contains('light-mode') ? 'fas fa-sun' : 'fas fa-moon';
        }

        function showBox(id) {
            document.querySelectorAll('.auth-container').forEach(b => b.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // دالة إرسال الإيميل المشتركة
        async function handleSendEmail(type) {
            let email = "";
            const user = (type === 'register') ? document.getElementById('regUser').value : document.getElementById('loginUser').value;

            if (!user) return alert("يرجى إدخال اسم المستخدم");

            if (type === 'register') {
                email = document.getElementById('regEmail').value;
                if (!email) return alert("يرج / إدخال الإيميل");
            } else {
                // جلب الإيميل من Firebase للـ Login
                const userRef = window.doc(window.db, "users", user);
                const snap = await window.getDoc(userRef);
                if (snap.exists()) {
                    email = snap.data().email;
                } else {
                    return alert("هذا المستخدم غير مسجل في الأرشيف العام!");
                }
            }

            generatedCode = Math.floor(1000 + Math.random() * 9000);
            const btn = (type === 'register') ? document.getElementById('regSendBtn') : document.getElementById('loginSendBtn');
            btn.disabled = true;
            btn.innerText = "جاري الإرسال...";

            emailjs.send("service_nd6soio", "YOUR_TEMPLATE_ID", {
                to_email: email,
                verification_code: generatedCode,
                user_name: user
            }).then(() => {
                alert("تم إرسال كود التحقق إلى " + email);
                btn.innerText = "تم الإرسال";
                if (type === 'register') document.getElementById('regVerify').classList.remove('hidden');
                else document.getElementById('login2FA').classList.remove('hidden');
            }).catch(err => {
                alert("فشل الإرسال: " + err.text);
                btn.disabled = false;
            });
        }

        // حفظ في الأرشيف العام (Firebase)
        async function finishRegister() {
            const code = document.getElementById('regCodeInput').value;
            const user = document.getElementById('regUser').value;
            const email = document.getElementById('regEmail').value;

            if (code == generatedCode) {
                try {
                    await window.setDoc(window.doc(window.db, "users", user), {
                        username: user,
                        email: email
                    });
                    alert("تم الحفظ في الأرشيف العام! يمكنك الآن الدخول من أي جهاز.");
                    showBox('loginBox');
                } catch (e) { alert("خطأ في القاعدة: " + e); }
            } else alert("كود التحقق خاطئ!");
        }

        // الدخول من الأرشيف العام
        async function finishLogin() {
            const code = document.getElementById('loginCodeInput').value;
            if (code == generatedCode) {
                localStorage.setItem('isLoggedIn', 'true');
                document.getElementById('dirtScreen').style.display = 'flex';
            } else alert("كود 2FA غلط!");
        }

        function logout() {
            localStorage.setItem('isLoggedIn', 'false');
            location.reload();
        }
    </script>
</body>
</html>
