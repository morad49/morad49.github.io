<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirtMc | Smooth Mobile System</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --text: #c9d1d9;
            --accent: #238636;
            --glow: 0 0 15px rgba(35, 134, 54, 0.4);
            --border: #30363d;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px; /* مهم للجوال */
            box-sizing: border-box;
        }

        .auth-container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px; /* يضبط العرض على الـ PC والجوال */
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { color: var(--accent); margin-bottom: 20px; letter-spacing: 2px; font-size: 1.5rem; }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            box-sizing: border-box;
            outline: none;
            font-size: 16px; /* يمنع الـ Zoom التلقائي في الآيفون */
        }

        input:focus { border-color: var(--accent); box-shadow: var(--glow); }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover { filter: brightness(1.2); box-shadow: var(--glow); }
        .btn:disabled { background: #222; cursor: not-allowed; opacity: 0.6; }

        .status-msg {
            display: none;
            background: rgba(35, 134, 54, 0.15);
            color: #4cd964;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            border: 1px solid var(--accent);
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #dirtScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
        }

        #dirtText {
            font-size: clamp(50px, 15vw, 120px);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px var(--accent);
            margin-bottom: 20px;
        }

        .hidden { display: none !important; }
        .switch-link { margin-top: 20px; display: block; color: var(--accent); cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <div id="registerBox" class="auth-container">
        <h2>REGISTER</h2>
        <div id="regStatus" class="status-msg">✅ SEND DONE! CHECK YOUR EMAIL</div>
        <input type="text" id="regUser" placeholder="USERNAME">
        <input type="email" id="regEmail" placeholder="EMAIL">
        <input type="password" id="regPass" placeholder="PASSWORD">
        <button class="btn" id="regSendBtn" onclick="handleAuth('register')">GET CODE</button>
        
        <div id="regVerify" class="hidden">
            <input type="text" id="regCodeInput" placeholder="ENTER 4-DIGIT CODE">
            <button class="btn" onclick="completeRegister()">ARCHIVE ACCOUNT</button>
        </div>
        <span class="switch-link" onclick="showBox('loginBox')">GO TO LOGIN</span>
    </div>

    <div id="loginBox" class="auth-container hidden">
        <h2>LOGIN</h2>
        <div id="loginStatus" class="status-msg">✅ SEND DONE! CHECK YOUR EMAIL</div>
        <input type="text" id="loginUser" placeholder="USERNAME">
        <input type="password" id="loginPass" placeholder="PASSWORD">
        <button class="btn" id="loginSendBtn" onclick="handleAuth('login')">REQUEST 2FA</button>
        
        <div id="login2FA" class="hidden">
            <input type="text" id="loginCodeInput" placeholder="ENTER 2FA CODE">
            <button class="btn" onclick="completeLogin()">ACCESS SYSTEM</button>
        </div>
        <span class="switch-link" onclick="showBox('registerBox')">GO TO REGISTER</span>
    </div>

    <div id="dirtScreen">
        <h1 id="dirtText">DIRT</h1>
        <a href="https://Discord.gg/dirtmc" target="_blank" style="color: var(--accent); text-decoration: none; font-weight: bold; font-size: 1.2rem;">Discord.gg/dirtmc</a>
        <button class="btn" style="width: auto; padding: 12px 40px; margin-top: 40px; background: #222;" onclick="location.reload()">LOGOUT</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        // عبي بيانات Firebase هنا لكي يعمل الأرشيف
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fBase = { db, doc, setDoc, getDoc };
    </script>

    <script>
        // تفعيل EmailJS
        (function() { emailjs.init("OqV7lpJJmCVgAnrx6"); })();

        let generatedCode = null;

        function showBox(id) {
            document.getElementById('registerBox').classList.add('hidden');
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function showStatus(boxId) {
            const el = document.getElementById(boxId);
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        async function handleAuth(type) {
            const user = (type === 'register') ? document.getElementById('regUser').value : document.getElementById('loginUser').value;
            const pass = (type === 'register') ? document.getElementById('regPass').value : document.getElementById('loginPass').value;
            const btn = (type === 'register') ? document.getElementById('regSendBtn') : document.getElementById('loginSendBtn');
            let email = "";

            if (!user || !pass) { alert("أدخل جميع البيانات أولاً!"); return; }

            btn.disabled = true;
            btn.innerText = "SENDING...";

            if (type === 'register') {
                email = document.getElementById('regEmail').value;
                if (!email) { alert("أدخل الإيميل!"); btn.disabled = false; btn.innerText = "GET CODE"; return; }
            } else {
                try {
                    const userRef = window.fBase.doc(window.fBase.db, "users", user);
                    const snap = await window.fBase.getDoc(userRef);
                    if (snap.exists()) {
                        if(snap.data().password !== pass) { alert("كلمة المرور خطأ!"); btn.disabled = false; btn.innerText = "REQUEST 2FA"; return; }
                        email = snap.data().email;
                    } else { alert("الحساب غير موجود!"); btn.disabled = false; btn.innerText = "REQUEST 2FA"; return; }
                } catch(e) { alert("Firebase Error: تأكد من إعدادات القاعدة"); btn.disabled = false; return; }
            }

            generatedCode = Math.floor(1000 + Math.random() * 9000);
            
            // تأكد من وضع الـ Template ID الصحيح هنا
            emailjs.send("service_nd6soio", "YOUR_TEMPLATE_ID", {
                to_email: email,
                verification_code: generatedCode
            }).then(() => {
                showStatus(type === 'register' ? 'regStatus' : 'loginStatus');
                btn.innerText = "SENT ✅";
                if (type === 'register') document.getElementById('regVerify').classList.remove('hidden');
                else document.getElementById('login2FA').classList.remove('hidden');
            }).catch((err) => {
                alert("خطأ في الإرسال: " + JSON.stringify(err));
                btn.disabled = false;
                btn.innerText = "RETRY";
            });
        }

        async function completeRegister() {
            const user = document.getElementById('regUser').value;
            const pass = document.getElementById('regPass').value;
            const email = document.getElementById('regEmail').value;
            const codeInput = document.getElementById('regCodeInput').value;

            if (codeInput == generatedCode) {
                try {
                    await window.fBase.setDoc(window.fBase.doc(window.fBase.db, "users", user), {
                        username: user, password: pass, email: email
                    });
                    alert("تم الحفظ في الأرشيف العام بنجاح!");
                    showBox('loginBox');
                } catch (e) { alert("خطأ في حفظ البيانات!"); }
            } else { alert("الكود غير صحيح!"); }
        }

        function completeLogin() {
            if (document.getElementById('loginCodeInput').value == generatedCode) {
                document.getElementById('dirtScreen').style.display = 'flex';
            } else { alert("الكود خطأ!"); }
        }
    </script>
</body>
</html>
