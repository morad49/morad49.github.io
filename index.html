<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DirtMc Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:'Poppins',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Canvas */
canvas{
  position:absolute;
  inset:0;
}

/* Center Text */
.center{
  position:absolute;
  text-align:center;
  opacity:0;
  transform:scale(.8);
  transition:1s cubic-bezier(.2,.9,.3,1);
}

.center.show{
  opacity:1;
  transform:scale(1);
}

h1{
  margin:0;
  font-size:60px;
  color:#fff;
  letter-spacing:4px;
  text-shadow:0 0 40px rgba(140,100,255,.6);
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 20px rgba(140,100,255,.4);}
  to{ text-shadow:0 0 60px rgba(140,100,255,.9);}
}

/* Discord Button */
.btn{
  margin-top:25px;
  padding:12px 28px;
  border-radius:40px;
  border:none;
  cursor:pointer;
  font-size:16px;
  font-weight:600;
  background:linear-gradient(90deg,#7a6bff,#a29bff);
  color:#fff;
  box-shadow:0 10px 40px rgba(120,100,255,.4);
  transition:.3s;
  position:relative;
  overflow:hidden;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 15px 60px rgba(120,100,255,.7);
}

.btn:active{
  transform:scale(.95);
}

/* ripple effect */
.btn::after{
  content:"";
  position:absolute;
  width:20px;
  height:20px;
  background:rgba(255,255,255,.5);
  border-radius:50%;
  transform:scale(0);
  opacity:0;
  pointer-events:none;
}

.btn.ripple::after{
  animation:ripple .6s linear;
}

@keyframes ripple{
  to{
    transform:scale(15);
    opacity:0;
  }
}

@media(max-width:600px){
  h1{ font-size:38px; }
}
</style>
</head>

<body>

<canvas id="heart"></canvas>

<div class="center" id="centerText">
  <h1>DirtMc</h1>
  <button class="btn" id="discordBtn">Join Discord</button>
</div>

<script>
const canvas = document.getElementById('heart');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
window.addEventListener('resize', resize);

let particles = [];
let finished = false;

/* Heart equation */
function heart(t){
  return {
    x: 16*Math.pow(Math.sin(t),3),
    y: 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
  }
}

/* Create particles */
for(let i=0;i<500;i++){
  let t = Math.random()*Math.PI*2;
  let pos = heart(t);
  particles.push({
    x: canvas.width/2 + pos.x*15,
    y: canvas.height/2 - pos.y*15,
    size: Math.random()*2+1,
    alpha: Math.random()
  });
}

let start = performance.now();

function draw(now){
  ctx.fillStyle="rgba(0,0,0,.15)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.fillStyle=`rgba(255,0,90,${p.alpha})`;
    ctx.shadowColor="rgba(255,0,120,.8)";
    ctx.shadowBlur=20;
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  });

  if(now-start < 4000){
    requestAnimationFrame(draw);
  }else if(!finished){
    finished=true;
    document.getElementById('centerText').classList.add('show');
  }
}

requestAnimationFrame(draw);

/* Discord Button Effects */
const btn = document.getElementById('discordBtn');

btn.addEventListener('click', function(e){
  btn.classList.remove('ripple');
  void btn.offsetWidth;
  btn.classList.add('ripple');

  // open discord
  window.open("https://discord.gg/dirtmc","_blank");
});
</script>

</body>
</html>
