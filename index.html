<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DirtMc Intro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:'Poppins',sans-serif;
}

/* Canvas Heart */
canvas{
  position:absolute;
  inset:0;
}

/* Final Screen */
.final{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  flex-direction:column;
  opacity:0;
  transform:scale(0.8);
  transition:1s cubic-bezier(.2,.9,.3,1);
  color:white;
  z-index:5;
}

.final.show{
  opacity:1;
  transform:scale(1);
}

.final h1{
  font-size:70px;
  margin:0;
  text-shadow:0 0 40px #7a6bff;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 20px #7a6bff;}
  to{ text-shadow:0 0 60px #a29bff;}
}

.btn{
  margin-top:25px;
  padding:12px 30px;
  border-radius:40px;
  border:none;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  background:linear-gradient(90deg,#7a6bff,#a29bff);
  color:white;
  box-shadow:0 10px 40px rgba(120,100,255,.4);
  transition:.3s;
}

.btn:hover{
  transform:scale(1.1);
}
</style>
</head>
<body>

<canvas id="heart"></canvas>

<div class="final" id="final">
  <h1>DirtMc</h1>
  <button class="btn" onclick="openDiscord()">Join Discord</button>
</div>

<script>

/* ===== HEART ANIMATION ===== */

const canvas = document.getElementById("heart");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

window.onresize = ()=>{
  canvas.width = innerWidth;
  canvas.height = innerHeight;
};

let particles = [];
let total = 350;

/* Heart Formula */
function heart(t){
  return {
    x: 16*Math.pow(Math.sin(t),3),
    y: 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
  };
}

/* Create Particles */
for(let i=0;i<total;i++){
  let t = Math.random()*Math.PI*2;
  let p = heart(t);
  particles.push({
    x: canvas.width/2 + p.x*18,
    y: canvas.height/2 - p.y*18,
    vx:(Math.random()-0.5)*2,
    vy:(Math.random()-0.5)*2,
    life:200+Math.random()*200
  });
}

let start = performance.now();

function draw(now){
  ctx.fillStyle="rgba(0,0,0,0.15)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach((p,i)=>{
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    ctx.beginPath();
    ctx.fillStyle="rgba(255,0,120,0.8)";
    ctx.shadowColor="#ff0077";
    ctx.shadowBlur=20;
    ctx.arc(p.x,p.y,2.5,0,Math.PI*2);
    ctx.fill();

    if(p.life<=0){
      particles.splice(i,1);
    }
  });

  if(particles.length>0){
    requestAnimationFrame(draw);
  }else{
    showFinal();
  }
}

requestAnimationFrame(draw);

/* ===== SHOW FINAL SCREEN ===== */

function showFinal(){
  const final = document.getElementById("final");
  setTimeout(()=>{
    final.classList.add("show");
    playSound();
  },500);
}

/* ===== SOUND ===== */

function playSound(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type="sine";
    o.frequency.value=800;
    g.gain.setValueAtTime(0.1,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+1);
    o.connect(g);
    g.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime+1);
  }catch(e){}
}

/* ===== DISCORD ===== */

function openDiscord(){
  window.open("https://discord.gg/dirtmc","_blank");
}

</script>

</body>
</html>
