<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirtMc | Premium Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="theme-night">

    <div class="menu-trigger" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
    </div>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-title">SYSTEM THEMES</div>
        <div class="theme-item" onclick="setTheme('night')"><i class="fas fa-moon"></i> NIGHT</div>
        <div class="theme-item" onclick="setTheme('sun')"><i class="fas fa-sun"></i> SUN</div>
        <div class="theme-item" onclick="setTheme('both')"><i class="fas fa-adjust"></i> BARZAKH</div>
    </nav>

    <div id="registerBox" class="main-card fade-in">
        <div class="brand">DIRT</div>
        <p class="tagline">NEW ARCHIVE CREATION</p>
        
        <div class="input-wrapper">
            <input type="text" id="regUser" placeholder=" " required>
            <label>USERNAME</label>
        </div>
        <div class="input-wrapper">
            <input type="email" id="regEmail" placeholder=" " required>
            <label>EMAIL ADDRESS</label>
        </div>
        <div class="input-wrapper">
            <input type="password" id="regPass" placeholder=" " required>
            <label>PASSWORD</label>
        </div>

        <button class="prime-btn" id="regBtn" onclick="handleAuth('register')">GET ACCESS CODE</button>

        <div id="regVerify" class="verify-zone hidden">
            <div class="pulse-msg">SECURE CODE DISPATCHED</div>
            <input type="text" id="regCodeInput" class="otp-field" placeholder="CODE">
            <button class="outline-btn" onclick="completeRegister()">AUTHORIZE</button>
        </div>

        <div class="switch-link" onclick="showBox('loginBox')">ALREADY MEMBER? LOGIN</div>
    </div>

    <div id="loginBox" class="main-card hidden">
        <div class="brand">DIRT</div>
        <p class="tagline">ARCHIVE AUTHENTICATION</p>
        
        <div class="input-wrapper">
            <input type="text" id="loginUser" placeholder=" " required>
            <label>USERNAME</label>
        </div>
        <div class="input-wrapper">
            <input type="password" id="loginPass" placeholder=" " required>
            <label>PASSWORD</label>
        </div>

        <button class="prime-btn" id="loginBtn" onclick="handleAuth('login')">REQUEST 2FA</button>

        <div id="login2FA" class="verify-zone hidden">
            <div class="pulse-msg">CHECK YOUR INBOX</div>
            <input type="text" id="loginCodeInput" class="otp-field" placeholder="CODE">
            <button class="outline-btn" onclick="completeLogin()">AUTHORIZE</button>
        </div>

        <div class="switch-link" onclick="showBox('registerBox')">NEW PLAYER? REGISTER</div>
    </div>

    <div id="dirtScreen" class="cinema-overlay">
        <h1 class="giant-logo">DIRT</h1>
        <div class="meta-box">
            <p class="ip-addr">dirtmc.pro 21411</p>
            <a href="https://discord.gg/dirtmc" target="_blank" class="disco-btn">
                <i class="fab fa-discord"></i> DISCORD
            </a>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
