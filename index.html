<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>DirtMc Server</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
 --accent:#6a5cff;
 --dark:#0e0e12;
 --glass:rgba(20,20,30,0.75);
}

body{
 margin:0;
 font-family:'Cairo',sans-serif;
 background:
 linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.85)),
 url('back.png');
 background-size:cover;
 background-position:center;
 background-attachment:fixed;
 color:#fff;
 overflow-x:auto;
}

/* عرض ثابت زي PC */
.wrapper{
 width:1200px;
 margin:auto;
}

/* NAV */
nav{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:30px 0;
}

.logo{
 font-size:32px;
 font-weight:700;
 color:var(--accent);
}

.menu a{
 color:white;
 text-decoration:none;
 margin-left:30px;
 font-weight:600;
 transition:0.3s;
}

.menu a:hover{
 color:var(--accent);
}

/* HERO */
.hero{
 display:flex;
 align-items:center;
 justify-content:space-between;
 height:90vh;
}

/* النص كله يمين */
.content{
 width:600px;
 background:var(--glass);
 padding:50px;
 border-radius:20px;
 backdrop-filter:blur(15px);
 box-shadow:0 0 40px rgba(0,0,0,0.6);
 text-align:right;
}

.badge{
 background:var(--accent);
 display:inline-block;
 padding:6px 15px;
 border-radius:50px;
 font-size:14px;
 margin-bottom:20px;
}

.content h1{
 font-size:65px;
 margin:15px 0;
}

.content p{
 font-size:20px;
 opacity:0.85;
 margin-bottom:30px;
}

.buttons{
 display:flex;
 gap:15px;
 justify-content:flex-start;
}

.btn{
 padding:14px 30px;
 border:none;
 border-radius:10px;
 font-weight:bold;
 cursor:pointer;
 transition:0.3s;
}

.primary{
 background:var(--accent);
 color:white;
 box-shadow:0 0 20px var(--accent);
}

.primary:hover{
 transform:translateY(-5px);
}

.secondary{
 background:transparent;
 border:2px solid var(--accent);
 color:white;
}

.secondary:hover{
 background:var(--accent);
}

/* الصورة يسار */
.character{
 width:450px;
 filter:drop-shadow(0 0 40px var(--accent));
 animation:float 4s ease-in-out infinite;
}

@keyframes float{
 0%,100%{transform:translateY(0);}
 50%{transform:translateY(-20px);}
}

/* زوم للجوال */
@media(max-width:768px){
 body{
  zoom:0.55;
 }
}

</style>
</head>
<body>

<div class="wrapper">

<nav>
 <div class="logo">DirtMc</div>
 <div class="menu">
  <a href="#">الرئيسية</a>
  <a href="#">المميزات</a>
  <a href="#">السيرفرات</a>
  <a href="https://discord.gg/dirtmc">ديسكورد</a>
 </div>
</nav>

<section class="hero">

 <div class="content">

  <div class="badge">WELCOME TO THE FUTURE</div>

  <h1>DirtMc Server</h1>

  <p>
  أفضل سيرفر QuickBox في المنطقة.  
  حماية قوية، أداء مستقر، وتجربة لعب احترافية بدون لاق.
  </p>

  <div class="buttons">
   <button class="btn primary" onclick="copyIP()">نسخ IP</button>
   <button class="btn secondary">انضم للديسكورد</button>
  </div>

 </div>

 <img src="netherite.png" class="character">

</section>

</div>

<script>

function copyIP(){
 navigator.clipboard.writeText("play.dirtmc.net");
 alert("تم نسخ IP السيرفر!");
}

</script>

</body>
</html>
