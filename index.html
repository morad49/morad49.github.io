<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirtMc | Smooth Green System</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --text: #c9d1d9;
            --accent: #238636; /* أخضر سادة سموث */
            --glow: 0 0 15px rgba(35, 134, 54, 0.4);
            --border: #30363d;
        }

        body.light-mode {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1b1f23;
            --accent: #2da44e;
            --glow: 0 0 10px rgba(45, 164, 78, 0.2);
            --border: #d0d7de;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: 0.5s;
        }

        /* زر التبديل علوي */
        .header-tools { position: fixed; top: 20px; display: flex; gap: 20px; z-index: 100; }
        .tool-btn { background: var(--card-bg); border: 1px solid var(--border); padding: 10px; border-radius: 50%; cursor: pointer; color: var(--text); transition: 0.3s; }

        .auth-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 { color: var(--accent); margin-top: 0; letter-spacing: 2px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: var(--glow); }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn:hover { filter: brightness(1.2); box-shadow: var(--glow); }

        /* رسالة النجاح داخل الـ Box */
        .status-msg {
            display: none;
            background: rgba(35, 134, 54, 0.1);
            color: var(--accent);
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 13px;
            border: 1px solid var(--accent);
        }

        #dirtScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #dirtText {
            font-size: 100px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px var(--accent);
            margin: 0;
        }

        .hidden { display: none; }
        .switch-link { margin-top: 15px; display: block; color: var(--accent); cursor: pointer; font-size: 13px; text-decoration: none; }
    </style>
</head>
<body>

    <div class="header-tools">
        <div class="tool-btn" onclick="toggleTheme()"><i id="themeIcon" class="fas fa-moon"></i></div>
    </div>

    <div id="registerBox" class="auth-container">
        <h2>REGISTER</h2>
        <div id="regStatus" class="status-msg">✅ SEND DONE! CHECK YOUR EMAIL</div>
        <input type="text" id="regUser" placeholder="USERNAME">
        <input type="email" id="regEmail" placeholder="EMAIL">
        <input type="password" id="regPass" placeholder="PASSWORD">
        <button class="btn" id="regSendBtn" onclick="handleAuth('register')">GET CODE</button>
        
        <div id="regVerify" class="hidden">
            <input type="text" id="regCodeInput" placeholder="ENTER 4-DIGIT CODE">
            <button class="btn" onclick="completeRegister()">ARCHIVE ACCOUNT</button>
        </div>
        <span class="switch-link" onclick="showBox('loginBox')">GO TO LOGIN</span>
    </div>

    <div id="loginBox" class="auth-container hidden">
        <h2>LOGIN</h2>
        <div id="loginStatus" class="status-msg">✅ SEND DONE! CHECK YOUR EMAIL</div>
        <input type="text" id="loginUser" placeholder="USERNAME">
        <input type="password" id="loginPass" placeholder="PASSWORD">
        <button class="btn" id="loginSendBtn" onclick="handleAuth('login')">REQUEST 2FA</button>
        
        <div id="login2FA" class="hidden">
            <input type="text" id="loginCodeInput" placeholder="ENTER 2FA CODE">
            <button class="btn" onclick="completeLogin()">ACCESS SYSTEM</button>
        </div>
        <span class="switch-link" onclick="showBox('registerBox')">GO TO REGISTER</span>
    </div>

    <div id="dirtScreen">
        <h1 id="dirtText">DIRT</h1>
        <a href="https://Discord.gg/dirtmc" target="_blank" style="color: var(--accent); text-decoration: none; margin-top: 20px; font-weight: bold; letter-spacing: 5px;">DISCORD.GG/DIRTMC</a>
        <button class="btn" style="width: auto; padding: 10px 40px; margin-top: 50px; background: #222;" onclick="location.reload()">LOGOUT</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        // عبي بيانات Firebase هنا ليعمل "الأرشيف العام"
        const firebaseConfig = {
            apiKey: "ضع_هنا_API_KEY",
            authDomain: "مشروعك.firebaseapp.com",
            projectId: "مشروعك_ID",
            storageBucket: "مشروعك.appspot.com",
            messagingSenderId: "ID_المرسل",
            appId: "APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.fBase = { db, doc, setDoc, getDoc };
    </script>

    <script>
        (function() { emailjs.init("OqV7lpJJmCVgAnrx6"); })();

        let generatedCode = null;

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('themeIcon');
            icon.className = document.body.classList.contains('light-mode') ? 'fas fa-sun' : 'fas fa-moon';
        }

        function showBox(id) {
            document.querySelectorAll('.auth-container').forEach(b => b.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function showStatus(boxId) {
            const el = document.getElementById(boxId);
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        async function handleAuth(type) {
            const user = (type === 'register') ? document.getElementById('regUser').value : document.getElementById('loginUser').value;
            const pass = (type === 'register') ? document.getElementById('regPass').value : document.getElementById('loginPass').value;
            let email = "";

            if (!user || !pass) return alert("MISSING DATA!");

            if (type === 'register') {
                email = document.getElementById('regEmail').value;
            } else {
                const userRef = window.fBase.doc(window.fBase.db, "users", user);
                const snap = await window.fBase.getDoc(userRef);
                if (snap.exists()) {
                    if(snap.data().password !== pass) return alert("WRONG PASSWORD!");
                    email = snap.data().email;
                } else return alert("USER NOT FOUND!");
            }

            generatedCode = Math.floor(1000 + Math.random() * 9000);
            
            // استبدل YOUR_TEMPLATE_ID بمعرف القالب الخاص بك
            emailjs.send("service_nd6soio", "YOUR_TEMPLATE_ID", {
                to_email: email,
                verification_code: generatedCode
            }).then(() => {
                showStatus(type === 'register' ? 'regStatus' : 'loginStatus');
                if (type === 'register') document.getElementById('regVerify').classList.remove('hidden');
                else document.getElementById('login2FA').classList.remove('hidden');
            });
        }

        async function completeRegister() {
            const user = document.getElementById('regUser').value;
            const pass = document.getElementById('regPass').value;
            const email = document.getElementById('regEmail').value;
            if (document.getElementById('regCodeInput').value == generatedCode) {
                await window.fBase.setDoc(window.fBase.doc(window.fBase.db, "users", user), {
                    username: user, password: pass, email: email
                });
                showBox('loginBox');
            } else alert("INVALID CODE!");
        }

        function completeLogin() {
            if (document.getElementById('loginCodeInput').value == generatedCode) {
                document.getElementById('dirtScreen').style.display = 'flex';
            } else alert("INVALID 2FA!");
        }
    </script>
</body>
</html>
