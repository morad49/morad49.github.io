<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirtMc | Secure System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --accent: #1c3dff;
            --border: rgba(255, 255, 255, 0.1);
        }

        body.light-mode {
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #121417;
            --accent: #2b3b8c;
            --border: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: all 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* زر التبديل */
        .theme-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            font-size: 28px;
            cursor: pointer;
            z-index: 1000;
            transition: transform 0.3s;
        }
        .theme-toggle:hover { transform: rotate(15deg) scale(1.1); }

        /* حاوية النماذج */
        .auth-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h2 { font-size: 28px; margin-bottom: 20px; letter-spacing: 1px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .switch-link {
            margin-top: 20px;
            font-size: 14px;
            cursor: pointer;
            color: var(--accent);
            display: block;
        }

        /* شاشة DIRT النهائية */
        #dirtScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        #dirtScreen h1 {
            font-size: 120px;
            color: #fff;
            font-family: 'Courier New', monospace;
            margin: 0;
            text-shadow: 0 0 20px var(--accent);
        }
        #dirtScreen a {
            color: #5865F2;
            text-decoration: none;
            font-size: 24px;
            margin-top: 20px;
            font-weight: bold;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="theme-toggle" onclick="toggleTheme()">
        <i id="themeIcon" class="fas fa-moon"></i>
    </div>

    <div id="registerBox" class="auth-container">
        <h2>إنشاء حساب جديد</h2>
        <input type="text" id="regUser" placeholder="اسم المستخدم">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
        <button class="btn" onclick="sendCode('register')">إرسال كود التأكيد</button>
        <div id="regVerify" class="hidden">
            <input type="text" id="regCode" placeholder="أدخل الكود المرسل لبريدك">
            <button class="btn" onclick="finishRegister()">تأكيد الحساب</button>
        </div>
        <span class="switch-link" onclick="showBox('loginBox')">لديك حساب؟ سجل دخولك</span>
    </div>

    <div id="loginBox" class="auth-container hidden">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="loginUser" placeholder="اسم المستخدم">
        <button class="btn" onclick="sendCode('login')">إرسال كود 2FA</button>
        <div id="login2FA" class="hidden">
            <input type="text" id="loginCode" placeholder="أدخل كود 2FA">
            <button class="btn" onclick="finishLogin()">دخول</button>
        </div>
        <span class="switch-link" onclick="showBox('registerBox')">ليس لديك حساب؟ سجل الآن</span>
    </div>

    <div id="dirtScreen">
        <h1 id="dirtText">DIRT</h1>
        <a href="https://Discord.gg/dirtmc" target="_blank">Discord.gg/dirtmc</a>
        <button class="btn" style="width: auto; margin-top: 50px; background: #333;" onclick="logout()">تسجيل الخروج</button>
    </div>

    <script>
        let generatedCode = null;

        // التحقق من الأرشيف (هل المستخدم مسجل دخول سابقاً؟)
        window.onload = () => {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                showDirtScreen();
            }
        };

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            body.classList.toggle('light-mode');
            icon.className = body.classList.contains('light-mode') ? 'fas fa-sun' : 'fas fa-moon';
        }

        function showBox(id) {
            document.querySelectorAll('.auth-container').forEach(box => box.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function sendCode(type) {
            generatedCode = Math.floor(1000 + Math.random() * 9000); // توليد كود وهمي
            alert("محاكاة: تم إرسال الكود " + generatedCode + " إلى بريدك الإلكتروني.");
            
            if (type === 'register') {
                document.getElementById('regVerify').classList.remove('hidden');
            } else {
                document.getElementById('login2FA').classList.remove('hidden');
            }
        }

        function finishRegister() {
            const code = document.getElementById('regCode').value;
            if (code == generatedCode) {
                const user = document.getElementById('regUser').value;
                localStorage.setItem('username', user); // نظام الأرشيف
                alert("تم التسجيل بنجاح! يمكنك الآن تسجيل الدخول.");
                showBox('loginBox');
            } else {
                alert("الكود خاطئ!");
            }
        }

        function finishLogin() {
            const code = document.getElementById('loginCode').value;
            const user = document.getElementById('loginUser').value;
            const savedUser = localStorage.getItem('username');

            if (user === savedUser && code == generatedCode) {
                localStorage.setItem('isLoggedIn', 'true');
                showDirtScreen();
            } else {
                alert("بيانات الدخول أو الكود غير صحيح!");
            }
        }

        function showDirtScreen() {
            document.getElementById('dirtScreen').style.display = 'flex';
        }

        function logout() {
            localStorage.setItem('isLoggedIn', 'false');
            location.reload();
        }
    </script>
</body>
</html>
