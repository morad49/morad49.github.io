<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirtMc | Final Fix</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Poppins:wght@300;600&display=swap');

        :root {
            --accent: #00ff66;
            --bg: #030508;
            --text: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.03);
            --input-bg: rgba(0, 0, 0, 0.5);
        }

        /* أنماط الثيمات */
        body.theme-sun {
            --bg: #f5f5f5; --text: #1a1a1a; --card-bg: rgba(0, 0, 0, 0.05); --input-bg: #fff; --accent: #008f39;
        }
        body.theme-both {
            background: linear-gradient(90deg, #030508 50%, #f5f5f5 50%) !important;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg); color: var(--text);
            font-family: 'Poppins', sans-serif; transition: 0.5s; overflow: hidden;
        }

        /* القائمة الجانبية Burger */
        .menu-btn {
            position: fixed; top: 30px; right: 30px; z-index: 1001; cursor: pointer;
            display: flex; flex-direction: column; gap: 6px; padding: 10px;
        }
        .menu-btn span { width: 30px; height: 3px; background: var(--accent); border-radius: 5px; transition: 0.3s; }

        .sidebar {
            position: fixed; top: 0; right: -320px; width: 300px; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .sidebar.active { right: 0; }
        .theme-option {
            padding: 20px; width: 80%; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1);
            color: white; transition: 0.3s;
        }
        .theme-option:hover { color: var(--accent); transform: translateX(-10px); }

        /* الحاويات */
        .auth-container {
            background: var(--card-bg); backdrop-filter: blur(20px);
            padding: 50px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            width: 100%; max-width: 400px; text-align: center; position: relative;
        }
        .logo-area { font-family: 'Orbitron', sans-serif; font-size: 45px; color: var(--accent); letter-spacing: 5px; margin-bottom: 10px; }
        
        input {
            width: 100%; padding: 15px; margin: 10px 0; background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: inherit; outline: none; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 255, 102, 0.2); }

        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; font-size: 16px;
        }
        .main-btn { background: var(--accent); color: #000; }
        .main-btn:active { transform: scale(0.95); }
        .done-btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); margin-top: 20px; }

        .status-info { color: var(--accent); font-size: 14px; margin-top: 20px; font-weight: bold; }
        .switch-txt { font-size: 13px; margin-top: 25px; cursor: pointer; opacity: 0.6; }
        .switch-txt:hover { opacity: 1; color: var(--accent); }

        /* شاشة النهاية */
        #dirtScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
        }
        .glow-text { font-family: 'Orbitron', sans-serif; font-size: clamp(60px, 15vw, 120px); color: #fff; text-shadow: 0 0 40px var(--accent); margin: 0; }
        .server-card { text-align: center; margin-top: 20px; }
        .discord-link { text-decoration: none; color: #fff; font-size: 22px; display: flex; align-items: center; gap: 10px; margin-top: 15px; transition: 0.3s; }
        .discord-link:hover { color: var(--accent); }

        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.6s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="theme-night">

    <div class="menu-btn" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
    </div>

    <div id="sidebar" class="sidebar">
        <div class="theme-option" onclick="setTheme('night')">Night <i class="fas fa-moon"></i></div>
        <div class="theme-option" onclick="setTheme('sun')">Sun <i class="fas fa-sun"></i></div>
        <div class="theme-option" onclick="setTheme('both')">Both <i class="fas fa-adjust"></i></div>
    </div>

    <div id="registerBox" class="auth-container fade-in">
        <div class="logo-area">DIRT</div>
        <h2>REGISTER</h2>
        <input type="text" id="regUser" placeholder="USERNAME">
        <input type="email" id="regEmail" placeholder="EMAIL ADDRESS">
        <input type="password" id="regPass" placeholder="PASSWORD">
        <button class="btn main-btn" id="regBtn" onclick="handleAuth('register')">SEND ACCESS CODE</button>
        
        <div id="regVerify" class="hidden">
            <p class="status-info">📩 CHECK YOUR EMAIL</p>
            <input type="text" id="regCodeInput" placeholder="2FA CODE">
            <button class="btn done-btn" onclick="completeRegister()">DONE</button>
        </div>
        <p class="switch-txt" onclick="showBox('loginBox')">ALREADY HAVE AN ACCOUNT? LOGIN</p>
    </div>

    <div id="loginBox" class="auth-container hidden">
        <div class="logo-area">DIRT</div>
        <h2>LOGIN</h2>
        <input type="text" id="loginUser" placeholder="USERNAME">
        <input type="password" id="loginPass" placeholder="PASSWORD">
        <button class="btn main-btn" id="loginBtn" onclick="handleAuth('login')">REQUEST LOGIN</button>
        
        <div id="login2FA" class="hidden">
            <p class="status-info">📩 CHECK YOUR EMAIL</p>
            <input type="text" id="loginCodeInput" placeholder="2FA CODE">
            <button class="btn done-btn" onclick="completeLogin()">DONE</button>
        </div>
        <p class="switch-txt" onclick="showBox('registerBox')">NEW PLAYER? REGISTER</p>
    </div>

    <div id="dirtScreen">
        <h1 class="glow-text">DIRT</h1>
        <div class="server-card">
            <p style="letter-spacing: 3px; color: #888;">dirtmc.pro 21411</p>
            <a href="https://discord.gg/dirtmc" target="_blank" class="discord-link">
                <i class="fab fa-discord" style="color: #5865F2; font-size: 35px;"></i> discord
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7oGrcD1ShriCYTP_0_vMPdPkkmd2GfwU",
            authDomain: "dirtmc-7c068.firebaseapp.com",
            projectId: "dirtmc-7c068",
            storageBucket: "dirtmc-7c068.firebasestorage.app",
            messagingSenderId: "808909665625",
            appId: "1:808909665625:web:0aa7aaad9c31dc0e0d4848"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // تفعيل EmailJS يدوياً
        emailjs.init("oqV7lpJJmCVgAnrx6");

        let generatedCode = null;

        // ربط الدوال بالنافذة (لتحل مشكلة الأزرار التي لا تعمل)
        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('active');
        
        window.setTheme = (t) => {
            document.body.className = 'theme-' + t;
            window.toggleSidebar();
        };

        window.showBox = (id) => {
            document.getElementById('registerBox').classList.add('hidden');
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        };

        window.handleAuth = async (type) => {
            const btn = document.getElementById(type === 'register' ? 'regBtn' : 'loginBtn');
            const user = document.getElementById(type === 'register' ? 'regUser' : 'loginUser').value;
            const pass = document.getElementById(type === 'register' ? 'regPass' : 'loginPass').value;
            let email = "";

            if (!user || !pass) return alert("Please fill all fields");

            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            if (type === 'register') {
                email = document.getElementById('regEmail').value;
            } else {
                try {
                    const snap = await getDoc(doc(db, "users", user));
                    if (snap.exists() && snap.data().password === pass) email = snap.data().email;
                    else { alert("Wrong Username/Password"); btn.disabled = false; btn.innerText = "LOGIN"; return; }
                } catch(e) { alert("Database Error"); btn.disabled = false; return; }
            }

            generatedCode = Math.floor(1000 + Math.random() * 9000);

            // الإرسال
            emailjs.send("Service_nd6soio", "template_f837clr", {
                to_email: email,
                verification_code: generatedCode
            }).then(() => {
                btn.innerText = "DONE! ✅";
                document.getElementById(type === 'register' ? 'regVerify' : 'login2FA').classList.remove('hidden');
            }).catch(err => {
                alert("EmailJS Error. Check your Service ID.");
                btn.disabled = false;
                btn.innerText = "RETRY";
            });
        };

        window.completeRegister = async () => {
            const user = document.getElementById('regUser').value;
            const pass = document.getElementById('regPass').value;
            const email = document.getElementById('regEmail').value;
            if (document.getElementById('regCodeInput').value == generatedCode) {
                await setDoc(doc(db, "users", user), { username: user, password: pass, email: email });
                alert("Archive Created! Please Login.");
                window.showBox('loginBox');
            } else alert("Invalid Code");
        };

        window.completeLogin = () => {
            if (document.getElementById('loginCodeInput').value == generatedCode) {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('dirtScreen').style.display = 'flex';
            } else alert("Invalid Code");
        };
    </script>
</body>
</html>
